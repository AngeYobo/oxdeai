<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-label="Three Layers of Agent Safety">
  <rect width="760" height="520" fill="#ffffff"/>

  <text x="50" y="48" font-family="Inter, Arial, sans-serif" font-size="28" fill="#111827" font-weight="700">Three Layers of Agent Safety</text>

  <!-- Layer 1 -->
  <rect x="50" y="80" width="660" height="110" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="76" y="112" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b" font-weight="600">LAYER 1</text>
  <text x="76" y="136" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1e293b" font-weight="600">Prompt and Output Guardrails</text>
  <text x="76" y="162" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">Input filtering · content moderation · output classifiers</text>

  <!-- Arrow 1→2 -->
  <defs>
    <marker id="arrd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <line x1="380" y1="190" x2="380" y2="218" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrd)"/>

  <!-- Layer 2 -->
  <rect x="50" y="218" width="660" height="110" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="2"/>
  <text x="76" y="250" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b" font-weight="600">LAYER 2</text>
  <text x="76" y="274" font-family="Inter, Arial, sans-serif" font-size="20" fill="#1e293b" font-weight="600">Runtime Monitoring and Observability</text>
  <text x="76" y="300" font-family="Inter, Arial, sans-serif" font-size="15" fill="#64748b">Tracing · logging · behavioral anomaly detection</text>

  <!-- Arrow 2→3 -->
  <line x1="380" y1="328" x2="380" y2="356" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#arrd)"/>

  <!-- Layer 3 (highlighted) -->
  <rect x="50" y="356" width="660" height="130" rx="12" fill="#eefbf3" stroke="#166534" stroke-width="3"/>
  <text x="76" y="390" font-family="Inter, Arial, sans-serif" font-size="13" fill="#166534" font-weight="600">LAYER 3  ←  OxDeAI</text>
  <text x="76" y="416" font-family="Inter, Arial, sans-serif" font-size="20" fill="#14532d" font-weight="700">Execution Authorization</text>
  <text x="76" y="444" font-family="Inter, Arial, sans-serif" font-size="15" fill="#166534">Deterministic pre-execution gate · cryptographic artifacts</text>
  <text x="76" y="466" font-family="Inter, Arial, sans-serif" font-size="15" fill="#166534">Fail-closed enforcement · tamper-evident audit evidence</text>
</svg>
