<svg xmlns="http://www.w3.org/2000/svg" width="920" height="860" viewBox="0 0 920 860" role="img" aria-label="OxDeAI Adapter Stack Flow">
  <rect width="920" height="860" fill="#ffffff"/>

  <text x="50" y="46" font-family="Inter, Arial, sans-serif" font-size="26" fill="#111827" font-weight="700">OxDeAI Adapter Stack Flow</text>

  <!-- A: Agent Runtime -->
  <rect x="260" y="72" width="360" height="80" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="440" y="106" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a" font-weight="600" text-anchor="middle">Agent Runtime</text>
  <text x="440" y="130" font-family="Inter, Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">LangGraph · CrewAI · OpenAI Agents SDK · AutoGen · OpenClaw</text>

  <!-- Arrow A → B -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a3412"/>
    </marker>
    <marker id="arr-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4338ca"/>
    </marker>
    <marker id="arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <line x1="440" y1="152" x2="440" y2="188" stroke="#334155" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="448" y="176" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">tool call</text>

  <!-- B: Runtime adapter packages -->
  <rect x="210" y="188" width="460" height="110" rx="10" fill="#f0f9ff" stroke="#0369a1" stroke-width="2"/>
  <text x="440" y="220" font-family="Inter, Arial, sans-serif" font-size="16" fill="#075985" font-weight="600" text-anchor="middle">Runtime adapter package</text>
  <text x="440" y="244" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0369a1" text-anchor="middle">@oxdeai/langgraph · @oxdeai/crewai · @oxdeai/openai-agents</text>
  <text x="440" y="264" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0369a1" text-anchor="middle">@oxdeai/autogen · @oxdeai/openclaw</text>
  <text x="440" y="285" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b" font-style="italic" text-anchor="middle">thin binding — no auth logic</text>

  <!-- Arrow B → C -->
  <line x1="440" y1="298" x2="440" y2="338" stroke="#334155" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="448" y="324" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">ProposedAction</text>

  <!-- C: @oxdeai/guard PEP -->
  <rect x="210" y="338" width="460" height="130" rx="12" fill="#fff7ed" stroke="#9a3412" stroke-width="3"/>
  <text x="440" y="374" font-family="Inter, Arial, sans-serif" font-size="18" fill="#7c2d12" font-weight="700" text-anchor="middle">@oxdeai/guard — PEP</text>
  <text x="440" y="398" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9a3412" font-weight="600" text-anchor="middle">all authorization logic here</text>
  <text x="440" y="422" font-family="Inter, Arial, sans-serif" font-size="13" fill="#7c2d12" text-anchor="middle">evaluatePure(intent, state) · verifyAuthorization(artifact)</text>
  <text x="440" y="444" font-family="Inter, Arial, sans-serif" font-size="13" fill="#7c2d12" text-anchor="middle">fail-closed enforcement</text>

  <!-- C ↔ D bidirectional: evaluate down, AuthorizationV1 up -->
  <!-- D: @oxdeai/core PDP — to the right -->
  <rect x="710" y="358" width="175" height="100" rx="10" fill="#eefbf3" stroke="#166534" stroke-width="2"/>
  <text x="797" y="390" font-family="Inter, Arial, sans-serif" font-size="14" fill="#14532d" font-weight="600" text-anchor="middle">@oxdeai/core</text>
  <text x="797" y="410" font-family="Inter, Arial, sans-serif" font-size="13" fill="#14532d" font-weight="600" text-anchor="middle">PDP</text>
  <text x="797" y="432" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">policy evaluation</text>
  <text x="797" y="450" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">AuthorizationV1</text>

  <!-- C → D (evaluate) -->
  <line x1="670" y1="396" x2="710" y2="396" stroke="#9a3412" stroke-width="2.5" marker-end="url(#arr-orange)"/>
  <text x="674" y="388" font-family="Inter, Arial, sans-serif" font-size="11" fill="#9a3412">evaluate</text>

  <!-- D → C (AuthorizationV1) -->
  <line x1="710" y1="420" x2="670" y2="420" stroke="#166534" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="672" y="438" font-family="Inter, Arial, sans-serif" font-size="11" fill="#166534">AuthorizationV1</text>

  <!-- Arrow C → E (ALLOW, left-down) -->
  <line x1="310" y1="468" x2="220" y2="580" stroke="#166534" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="218" y="528" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534">ALLOW</text>

  <!-- Arrow C → F (DENY, right-down) -->
  <line x1="570" y1="468" x2="660" y2="580" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="618" y="528" font-family="Inter, Arial, sans-serif" font-size="12" fill="#dc2626">DENY</text>

  <!-- E: External system / tool -->
  <rect x="80" y="580" width="260" height="80" rx="10" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="210" y="614" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="600" text-anchor="middle">External system / tool</text>
  <text x="210" y="638" font-family="Inter, Arial, sans-serif" font-size="13" fill="#334155" text-anchor="middle">API · infrastructure · payments</text>

  <!-- F: OxDeAIDenyError -->
  <rect x="560" y="580" width="260" height="80" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="690" y="614" font-family="Inter, Arial, sans-serif" font-size="15" fill="#b91c1c" font-weight="600" text-anchor="middle">OxDeAIDenyError</text>
  <text x="690" y="638" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b91c1c" text-anchor="middle">no side effect</text>

  <!-- Arrow E → G -->
  <line x1="210" y1="660" x2="210" y2="756" stroke="#64748b" stroke-width="2" marker-end="url(#arr-slate)"/>
  <text x="216" y="714" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">evidence</text>

  <!-- G: Evidence chain -->
  <rect x="60" y="756" width="700" height="68" rx="10" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="410" y="786" font-family="Inter, Arial, sans-serif" font-size="14" fill="#312e81" font-weight="600" text-anchor="middle">Audit events  →  Snapshot  →  Verification Envelope  →  verifyEnvelope()</text>
  <text x="410" y="810" font-family="Inter, Arial, sans-serif" font-size="13" fill="#4338ca" text-anchor="middle">stateless offline verification</text>
</svg>
