<svg xmlns="http://www.w3.org/2000/svg" width="800" height="940" viewBox="0 0 800 940" role="img" aria-label="OxDeAI Core — Protocol Responsibilities">
  <rect width="800" height="940" fill="#ffffff"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arr-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4338ca"/>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0e7490"/>
    </marker>
  </defs>

  <!-- ── Input ── -->
  <rect x="250" y="50" width="300" height="60" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="400" y="86" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="600" text-anchor="middle">(intent, state)</text>

  <!-- Input → PolicyEngine -->
  <line x1="400" y1="110" x2="400" y2="148" stroke="#334155" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ── PolicyEngine ── -->
  <rect x="150" y="148" width="500" height="134" rx="12" fill="#eefbf3" stroke="#166534" stroke-width="3"/>
  <text x="400" y="186" font-family="Inter, Arial, sans-serif" font-size="20" fill="#14532d" font-weight="700" text-anchor="middle">PolicyEngine</text>
  <text x="400" y="210" font-family="Inter, Arial, sans-serif" font-size="13" fill="#14532d" text-anchor="middle">evaluatePure(intent, state)</text>
  <text x="400" y="234" font-family="Inter, Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">policyId  ·  stateHash  ·  deterministic  ·  fail-closed</text>
  <text x="400" y="256" font-family="Inter, Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Budget  ·  Velocity  ·  Recursion  ·  Concurrency  ·  Replay  ·  KillSwitch  ·  Allowlist</text>

  <!-- PolicyEngine → DENY -->
  <line x1="300" y1="282" x2="220" y2="350" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="226" y="308" font-family="Inter, Arial, sans-serif" font-size="12" fill="#dc2626" font-weight="600" text-anchor="end">DENY</text>

  <!-- PolicyEngine → AuthorizationV1 -->
  <line x1="500" y1="282" x2="572" y2="350" stroke="#166534" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="574" y="308" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534" font-weight="600" text-anchor="start">ALLOW</text>

  <!-- ── DENY ── -->
  <rect x="40" y="350" width="220" height="88" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="150" y="386" font-family="Inter, Arial, sans-serif" font-size="18" fill="#991b1b" font-weight="700" text-anchor="middle">DENY</text>
  <text x="150" y="408" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b91c1c" text-anchor="middle">OxDeAIDenyError</text>
  <text x="150" y="428" font-family="Inter, Arial, sans-serif" font-size="11" fill="#b91c1c" text-anchor="middle">no side effect · audit recorded</text>

  <!-- ── AuthorizationV1 ── -->
  <rect x="490" y="350" width="270" height="88" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="625" y="382" font-family="Inter, Arial, sans-serif" font-size="16" fill="#312e81" font-weight="700" text-anchor="middle">AuthorizationV1</text>
  <text x="625" y="403" font-family="Inter, Arial, sans-serif" font-size="12" fill="#4338ca" text-anchor="middle">intent_hash · state_hash · policy_id</text>
  <text x="625" y="422" font-family="Inter, Arial, sans-serif" font-size="12" fill="#4338ca" text-anchor="middle">issued_at · expiry · Ed25519 signature</text>

  <!-- DENY → Audit chain -->
  <line x1="200" y1="438" x2="278" y2="500" stroke="#475569" stroke-width="2" marker-end="url(#arr-slate)"/>

  <!-- AuthorizationV1 → Audit chain -->
  <line x1="580" y1="438" x2="510" y2="500" stroke="#475569" stroke-width="2" marker-end="url(#arr-slate)"/>

  <!-- ── Audit chain ── -->
  <rect x="190" y="500" width="420" height="80" rx="8" fill="#f8fafc" stroke="#475569" stroke-width="2"/>
  <text x="400" y="534" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="600" text-anchor="middle">Audit chain</text>
  <text x="400" y="556" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569" text-anchor="middle">hash-chained events  ·  auditHeadHash</text>

  <!-- Audit → Snapshot -->
  <line x1="400" y1="580" x2="400" y2="618" stroke="#334155" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- ── Canonical Snapshot ── -->
  <rect x="190" y="618" width="420" height="76" rx="8" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="400" y="650" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="600" text-anchor="middle">Canonical Snapshot</text>
  <text x="400" y="672" font-family="Inter, Arial, sans-serif" font-size="13" fill="#475569" text-anchor="middle">stateHash  ·  formatVersion: 1  ·  policyId-bound</text>

  <!-- Snapshot → Verification Envelope -->
  <line x1="400" y1="694" x2="400" y2="730" stroke="#4338ca" stroke-width="2.5" marker-end="url(#arr-indigo)"/>

  <!-- ── Verification Envelope ── -->
  <rect x="140" y="730" width="520" height="76" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="400" y="762" font-family="Inter, Arial, sans-serif" font-size="16" fill="#312e81" font-weight="600" text-anchor="middle">Verification Envelope</text>
  <text x="400" y="784" font-family="Inter, Arial, sans-serif" font-size="13" fill="#4338ca" text-anchor="middle">snapshot  +  audit events  +  policyId</text>

  <!-- Envelope → verifyEnvelope -->
  <line x1="400" y1="806" x2="400" y2="842" stroke="#0e7490" stroke-width="2.5" marker-end="url(#arr-cyan)"/>

  <!-- ── Stateless Verification ── -->
  <rect x="100" y="842" width="600" height="76" rx="8" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/>
  <text x="400" y="874" font-family="Inter, Arial, sans-serif" font-size="15" fill="#155e75" font-weight="600" text-anchor="middle">verifyEnvelope()  ·  verifyAuthorization()</text>
  <text x="400" y="898" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0e7490" text-anchor="middle">ok  ·  invalid  ·  inconclusive  -  stateless  ·  offline</text>
</svg>
