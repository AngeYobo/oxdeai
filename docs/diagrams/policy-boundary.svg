<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="310" viewBox="0 0 1280 310" role="img" aria-label="OxDeAI - Policy Boundary">
  <rect width="1280" height="310" fill="#ffffff"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- A: Agent / Runtime -->
  <rect x="20" y="120" width="190" height="70" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="115" y="151" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0f172a" font-weight="600" text-anchor="middle">Agent / Runtime</text>
  <text x="115" y="173" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">LangGraph · CrewAI · AutoGen</text>

  <!-- B: Proposed Action pill on arrow — no separate box, label only -->

  <!-- C: Policy Gate (diamond) -->
  <!-- center: (540, 155), hw: 110, hh: 55 -->
  <polygon points="430,155 540,100 650,155 540,210" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="540" y="150" font-family="Inter, Arial, sans-serif" font-size="14" fill="#713f12" font-weight="700" text-anchor="middle">Policy</text>
  <text x="540" y="170" font-family="Inter, Arial, sans-serif" font-size="14" fill="#713f12" font-weight="700" text-anchor="middle">Gate</text>

  <!-- D: Tool Execution (ALLOW path) -->
  <rect x="705" y="80" width="195" height="70" rx="10" fill="#eefbf3" stroke="#166534" stroke-width="2"/>
  <text x="802" y="111" font-family="Inter, Arial, sans-serif" font-size="15" fill="#14532d" font-weight="600" text-anchor="middle">Tool Execution</text>
  <text x="802" y="133" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534" text-anchor="middle">side effect occurs</text>

  <!-- E: Blocked (DENY path) — dashed red -->
  <rect x="705" y="210" width="195" height="70" rx="10" fill="#fff5f5" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="802" y="241" font-family="Inter, Arial, sans-serif" font-size="15" fill="#dc2626" font-weight="600" text-anchor="middle">Blocked</text>
  <text x="802" y="263" font-family="Inter, Arial, sans-serif" font-size="12" fill="#dc2626" text-anchor="middle">no side effect</text>

  <!-- F: APIs / Infra / Payments / Tools -->
  <rect x="960" y="80" width="300" height="70" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="1110" y="108" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155" font-weight="600" text-anchor="middle">APIs / Infra /</text>
  <text x="1110" y="130" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155" font-weight="600" text-anchor="middle">Payments / Tools</text>

  <!-- A → Diamond: proposed action pill -->
  <line x1="210" y1="155" x2="428" y2="155" stroke="#334155" stroke-width="2.5" marker-end="url(#arr)"/>
  <rect x="244" y="135" width="152" height="19" rx="4" fill="#f1f5f9" stroke="#475569" stroke-width="1"/>
  <text x="320" y="149" font-family="Inter, Arial, sans-serif" font-size="12" fill="#1e293b" font-weight="700" text-anchor="middle">proposed action</text>

  <!-- Diamond → D: ALLOW pill -->
  <path d="M 650,155 C 680,155 680,115 703,115" fill="none" stroke="#166534" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <rect x="648" y="119" width="62" height="19" rx="4" fill="#dcfce7" stroke="#166534" stroke-width="1"/>
  <text x="679" y="133" font-family="Inter, Arial, sans-serif" font-size="13" fill="#166534" font-weight="700" text-anchor="middle">ALLOW</text>

  <!-- Diamond → E: DENY pill -->
  <path d="M 650,155 C 680,155 680,245 703,245" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <rect x="648" y="169" width="56" height="19" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="676" y="183" font-family="Inter, Arial, sans-serif" font-size="13" fill="#dc2626" font-weight="700" text-anchor="middle">DENY</text>

  <!-- D → F -->
  <line x1="900" y1="115" x2="958" y2="115" stroke="#166534" stroke-width="2.5" marker-end="url(#arr-green)"/>
</svg>
