<svg xmlns="http://www.w3.org/2000/svg" width="700" height="800" viewBox="0 0 700 800" role="img" aria-label="OxDeAI - Execution Authorization Boundary">
  <rect width="700" height="800" fill="#ffffff"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b91c1c"/>
    </marker>
    <marker id="arr-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4338ca"/>
    </marker>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9a3412"/>
    </marker>
  </defs>

  <!-- Runtime / Agent -->
  <rect x="210" y="30" width="280" height="64" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="350" y="68" font-family="Inter, Arial, sans-serif" font-size="17" fill="#0f172a" font-weight="600" text-anchor="middle">Runtime / Agent</text>

  <!-- Runtime → Adapter -->
  <line x1="350" y1="94" x2="350" y2="134" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Adapter Normalization -->
  <rect x="190" y="134" width="320" height="64" rx="10" fill="#f1f5f9" stroke="#475569" stroke-width="2"/>
  <text x="350" y="162" font-family="Inter, Arial, sans-serif" font-size="16" fill="#1e293b" font-weight="600" text-anchor="middle">Adapter Normalization</text>
  <text x="350" y="183" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">runtime action surface - deterministic intent</text>

  <!-- Adapter → PDP -->
  <line x1="350" y1="198" x2="350" y2="238" stroke="#334155" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="280" y="203" width="140" height="18" rx="3" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="350" y="216" font-family="Inter, Arial, sans-serif" font-size="11" fill="#475569" font-weight="600" text-anchor="middle">intent + state</text>

  <!-- OxDeAI PDP -->
  <rect x="140" y="238" width="420" height="100" rx="12" fill="#ecfdf5" stroke="#166534" stroke-width="3"/>
  <text x="350" y="278" font-family="Inter, Arial, sans-serif" font-size="19" fill="#14532d" font-weight="700" text-anchor="middle">OxDeAI PDP</text>
  <text x="350" y="302" font-family="Inter, Arial, sans-serif" font-size="13" fill="#14532d" text-anchor="middle">deterministic evaluation - fail-closed</text>
  <text x="350" y="322" font-family="Inter, Arial, sans-serif" font-size="11" fill="#374151" text-anchor="middle">Budget - Velocity - Recursion - Concurrency - Replay - KillSwitch</text>

  <!-- PDP ↙ DENY -->
  <line x1="260" y1="338" x2="130" y2="406" stroke="#b91c1c" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="178" y="366" font-family="Inter, Arial, sans-serif" font-size="13" fill="#b91c1c" font-weight="700" text-anchor="middle">DENY</text>

  <!-- PDP ↘ ALLOW -->
  <line x1="440" y1="338" x2="540" y2="406" stroke="#166534" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="512" y="366" font-family="Inter, Arial, sans-serif" font-size="13" fill="#166534" font-weight="700" text-anchor="middle">ALLOW</text>

  <!-- DENY: No Execution -->
  <rect x="20" y="406" width="220" height="70" rx="8" fill="#fef2f2" stroke="#b91c1c" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="130" y="436" font-family="Inter, Arial, sans-serif" font-size="16" fill="#991b1b" font-weight="700" text-anchor="middle">DENY</text>
  <text x="130" y="456" font-family="Inter, Arial, sans-serif" font-size="12" fill="#b91c1c" text-anchor="middle">no side effect</text>
  <text x="130" y="472" font-family="Inter, Arial, sans-serif" font-size="11" fill="#b91c1c" text-anchor="middle">audit event recorded</text>

  <!-- AuthorizationV1 -->
  <rect x="420" y="406" width="254" height="70" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="547" y="436" font-family="Inter, Arial, sans-serif" font-size="15" fill="#312e81" font-weight="700" text-anchor="middle">AuthorizationV1</text>
  <text x="547" y="456" font-family="Inter, Arial, sans-serif" font-size="11" fill="#4338ca" text-anchor="middle">signed - expiring</text>
  <text x="547" y="472" font-family="Inter, Arial, sans-serif" font-size="11" fill="#4338ca" text-anchor="middle">bound to intent + state + policy</text>

  <!-- AuthV1 → PEP -->
  <line x1="547" y1="476" x2="547" y2="516" stroke="#4338ca" stroke-width="2" marker-end="url(#arr-indigo)"/>

  <!-- PEP verifyAuthorization -->
  <rect x="408" y="516" width="274" height="90" rx="10" fill="#fff7ed" stroke="#9a3412" stroke-width="2.5"/>
  <text x="545" y="548" font-family="Inter, Arial, sans-serif" font-size="16" fill="#7c2d12" font-weight="700" text-anchor="middle">@oxdeai/guard</text>
  <text x="545" y="570" font-family="Inter, Arial, sans-serif" font-size="13" fill="#9a3412" font-weight="600" text-anchor="middle">PEP - verifyAuthorization()</text>
  <text x="545" y="590" font-family="Inter, Arial, sans-serif" font-size="11" fill="#b45309" text-anchor="middle">execution blocked if verification fails</text>

  <!-- PEP → Side Effect -->
  <line x1="545" y1="606" x2="545" y2="646" stroke="#9a3412" stroke-width="2" marker-end="url(#arr-orange)"/>
  <rect x="460" y="622" width="90" height="18" rx="3" fill="#fff7ed" stroke="#9a3412" stroke-width="0.8"/>
  <text x="505" y="635" font-family="Inter, Arial, sans-serif" font-size="11" fill="#9a3412" font-weight="600" text-anchor="middle">verified</text>

  <!-- Side Effect -->
  <rect x="415" y="646" width="260" height="64" rx="8" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="545" y="676" font-family="Inter, Arial, sans-serif" font-size="16" fill="#0f172a" font-weight="600" text-anchor="middle">Side Effect</text>
  <text x="545" y="696" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">API - tool - infrastructure - payment</text>

  <!-- DENY dashed merge line to evidence -->
  <line x1="130" y1="476" x2="130" y2="718" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="130" y1="718" x2="350" y2="718" stroke="#b91c1c" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Evidence strip -->
  <rect x="190" y="738" width="320" height="34" rx="6" fill="#f8fafc" stroke="#475569" stroke-width="1.5"/>
  <text x="350" y="760" font-family="Inter, Arial, sans-serif" font-size="12" fill="#334155" font-weight="600" text-anchor="middle">audit chain - snapshot - verification envelope</text>
</svg>
