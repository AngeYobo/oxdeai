<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="660" viewBox="0 0 1500 660" role="img" aria-label="OxDeAI Adapter Execution Boundary">
  <rect width="1500" height="660" fill="#ffffff"/>

  <text x="50" y="52" font-family="Inter, Arial, sans-serif" font-size="30" fill="#111827" font-weight="700">OxDeAI Adapter Execution Boundary</text>

  <!-- Agent Runtime -->
  <rect x="40" y="100" width="220" height="180" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="2"/>
  <text x="64" y="138" font-family="Inter, Arial, sans-serif" font-size="20" fill="#0f172a" font-weight="600">Agent Runtime</text>
  <text x="64" y="166" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">LangGraph / CrewAI</text>
  <text x="64" y="188" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">OpenAI Agents SDK</text>
  <text x="64" y="210" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">AutoGen / OpenClaw</text>

  <!-- Adapter packages -->
  <rect x="320" y="80" width="280" height="220" rx="10" fill="#f0f9ff" stroke="#0369a1" stroke-width="2"/>
  <text x="344" y="118" font-family="Inter, Arial, sans-serif" font-size="18" fill="#075985" font-weight="600">Adapter package</text>
  <text x="344" y="146" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0369a1">@oxdeai/langgraph</text>
  <text x="344" y="166" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0369a1">@oxdeai/crewai</text>
  <text x="344" y="186" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0369a1">@oxdeai/openai-agents</text>
  <text x="344" y="206" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0369a1">@oxdeai/autogen</text>
  <text x="344" y="226" font-family="Inter, Arial, sans-serif" font-size="13" fill="#0369a1">@oxdeai/openclaw</text>
  <text x="344" y="256" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b" font-style="italic">thin binding — no auth logic</text>

  <!-- @oxdeai/guard -->
  <rect x="670" y="80" width="300" height="220" rx="12" fill="#fff7ed" stroke="#9a3412" stroke-width="3"/>
  <text x="694" y="118" font-family="Inter, Arial, sans-serif" font-size="20" fill="#7c2d12" font-weight="700">@oxdeai/guard</text>
  <text x="694" y="144" font-family="Inter, Arial, sans-serif" font-size="14" fill="#9a3412" font-weight="600">PEP — all auth logic here</text>
  <text x="694" y="172" font-family="Inter, Arial, sans-serif" font-size="13" fill="#7c2d12">evaluatePure(intent, state)</text>
  <text x="694" y="194" font-family="Inter, Arial, sans-serif" font-size="13" fill="#7c2d12">verifyAuthorization(artifact)</text>
  <text x="694" y="216" font-family="Inter, Arial, sans-serif" font-size="13" fill="#7c2d12">fail-closed enforcement</text>

  <!-- @oxdeai/core PDP -->
  <rect x="670" y="340" width="300" height="130" rx="10" fill="#eefbf3" stroke="#166534" stroke-width="2"/>
  <text x="694" y="374" font-family="Inter, Arial, sans-serif" font-size="18" fill="#14532d" font-weight="600">@oxdeai/core — PDP</text>
  <text x="694" y="400" font-family="Inter, Arial, sans-serif" font-size="14" fill="#374151">Policy evaluation</text>
  <text x="694" y="424" font-family="Inter, Arial, sans-serif" font-size="14" fill="#374151">AuthorizationV1 on ALLOW</text>

  <!-- Tool execution -->
  <rect x="1060" y="100" width="280" height="140" rx="10" fill="#ffffff" stroke="#475569" stroke-width="2"/>
  <text x="1084" y="138" font-family="Inter, Arial, sans-serif" font-size="18" fill="#0f172a" font-weight="600">Tool / External System</text>
  <text x="1084" y="164" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">API · GPU · payment</text>
  <text x="1084" y="186" font-family="Inter, Arial, sans-serif" font-size="14" fill="#334155">cloud · database</text>

  <!-- Refused -->
  <rect x="1060" y="280" width="280" height="86" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="1084" y="316" font-family="Inter, Arial, sans-serif" font-size="16" fill="#b91c1c" font-weight="600">Refused — OxDeAIDenyError</text>
  <text x="1084" y="342" font-family="Inter, Arial, sans-serif" font-size="14" fill="#b91c1c">no side effect</text>

  <!-- Evidence row -->
  <rect x="670" y="520" width="150" height="60" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="706" y="557" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0f172a">Audit Events</text>

  <rect x="840" y="520" width="150" height="60" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="869" y="557" font-family="Inter, Arial, sans-serif" font-size="15" fill="#0f172a">Snapshot</text>

  <rect x="1010" y="520" width="190" height="60" rx="8" fill="#eef2ff" stroke="#4338ca" stroke-width="2"/>
  <text x="1036" y="557" font-family="Inter, Arial, sans-serif" font-size="15" fill="#312e81">Verify Envelope</text>

  <rect x="1220" y="520" width="190" height="60" rx="8" fill="#ecfeff" stroke="#0e7490" stroke-width="2"/>
  <text x="1238" y="557" font-family="Inter, Arial, sans-serif" font-size="15" fill="#155e75">verifyEnvelope()</text>

  <!-- Arrows -->
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#166534"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
    <marker id="arr-slate" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arr-indigo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4338ca"/>
    </marker>
    <marker id="arr-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0e7490"/>
    </marker>
  </defs>

  <!-- Runtime → Adapter -->
  <line x1="260" y1="190" x2="320" y2="190" stroke="#334155" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="265" y="180" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">tool call</text>

  <!-- Adapter → Guard -->
  <line x1="600" y1="190" x2="670" y2="190" stroke="#334155" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="604" y="180" font-family="Inter, Arial, sans-serif" font-size="12" fill="#64748b">ProposedAction</text>

  <!-- Guard ↓ PDP (evaluate) -->
  <line x1="840" y1="300" x2="840" y2="340" stroke="#9a3412" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="848" y="326" font-family="Inter, Arial, sans-serif" font-size="12" fill="#9a3412">evaluate</text>

  <!-- PDP ↑ Guard (AuthorizationV1) -->
  <line x1="810" y1="340" x2="810" y2="300" stroke="#166534" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="720" y="326" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534">AuthorizationV1</text>

  <!-- Guard → Tool (ALLOW) -->
  <line x1="970" y1="160" x2="1060" y2="160" stroke="#166534" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="978" y="150" font-family="Inter, Arial, sans-serif" font-size="12" fill="#166534">ALLOW →</text>

  <!-- Guard → Refused (DENY) -->
  <line x1="970" y1="220" x2="1060" y2="306" stroke="#dc2626" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-red)"/>
  <text x="978" y="248" font-family="Inter, Arial, sans-serif" font-size="12" fill="#dc2626">DENY ↘</text>

  <!-- Tool → evidence -->
  <line x1="1200" y1="240" x2="820" y2="520" stroke="#64748b" stroke-width="2" marker-end="url(#arr-slate)"/>

  <!-- evidence chain -->
  <line x1="820" y1="550" x2="840" y2="550" stroke="#64748b" stroke-width="2" marker-end="url(#arr-slate)"/>
  <line x1="990" y1="550" x2="1010" y2="550" stroke="#4338ca" stroke-width="2" marker-end="url(#arr-indigo)"/>
  <line x1="1200" y1="550" x2="1220" y2="550" stroke="#0e7490" stroke-width="2" marker-end="url(#arr-cyan)"/>
</svg>
