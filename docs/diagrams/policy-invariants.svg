<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-label="OxDeAI - Agent Risks to Policy Invariants">

  <defs>
    <filter id="shadow-sm" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <filter id="shadow-risk" x="-10%" y="-10%" width="120%" height="134%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#991b1b" flood-opacity="0.10"/>
    </filter>
    <filter id="shadow-inv" x="-10%" y="-10%" width="120%" height="134%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#166534" flood-opacity="0.12"/>
    </filter>
    <linearGradient id="risk-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7f7"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="inv-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="760" height="420" fill="#f8fafc"/>

  <!-- Agent Risks source node — narrow oval -->
  <ellipse cx="82" cy="205" rx="62" ry="38" fill="#fff7ed" stroke="#f97316" stroke-width="2" filter="url(#shadow-sm)"/>
  <text x="82" y="200" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7c2d12" font-weight="700" text-anchor="middle">Agent</text>
  <text x="82" y="216" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7c2d12" font-weight="700" text-anchor="middle">Risks</text>

  <!-- Risk nodes (x=185, w=175, h=44) -->
  <rect x="185" y="13"  width="175" height="44" rx="9" fill="url(#risk-grad)" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow-risk)"/>
  <text x="272" y="40"  font-family="Inter, Arial, sans-serif" font-size="13" fill="#991b1b" font-weight="600" text-anchor="middle">Unbounded spend</text>

  <rect x="185" y="78"  width="175" height="44" rx="9" fill="url(#risk-grad)" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow-risk)"/>
  <text x="272" y="105" font-family="Inter, Arial, sans-serif" font-size="13" fill="#991b1b" font-weight="600" text-anchor="middle">Execution storms</text>

  <rect x="185" y="143" width="175" height="44" rx="9" fill="url(#risk-grad)" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow-risk)"/>
  <text x="272" y="170" font-family="Inter, Arial, sans-serif" font-size="13" fill="#991b1b" font-weight="600" text-anchor="middle">Parallel explosion</text>

  <rect x="185" y="228" width="175" height="44" rx="9" fill="url(#risk-grad)" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow-risk)"/>
  <text x="272" y="255" font-family="Inter, Arial, sans-serif" font-size="13" fill="#991b1b" font-weight="600" text-anchor="middle">Replay risk</text>

  <rect x="185" y="313" width="175" height="44" rx="9" fill="url(#risk-grad)" stroke="#fca5a5" stroke-width="1.5" filter="url(#shadow-risk)"/>
  <text x="272" y="340" font-family="Inter, Arial, sans-serif" font-size="13" fill="#991b1b" font-weight="600" text-anchor="middle">Unsafe scope</text>

  <!-- Fan-out arrows: Agent Risks → Risk nodes -->
  <line x1="144" y1="205" x2="183" y2="35"  stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="144" y1="205" x2="183" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="144" y1="205" x2="183" y2="165" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="144" y1="205" x2="183" y2="250" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="144" y1="205" x2="183" y2="335" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Bridge arrows: Risk → Invariant -->
  <line x1="360" y1="35"  x2="410" y2="35"  stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="360" y1="100" x2="410" y2="100" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="360" y1="165" x2="410" y2="165" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="360" y1="250" x2="410" y2="250" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="360" y1="335" x2="410" y2="335" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arr-green)"/>

  <!-- Invariant nodes (x=412, w=310, h=44) -->
  <rect x="412" y="13"  width="310" height="44" rx="9" fill="url(#inv-grad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow-inv)"/>
  <text x="567" y="33"  font-family="Inter, Arial, sans-serif" font-size="13" fill="#14532d" font-weight="700" text-anchor="middle">Budget Invariant</text>
  <text x="567" y="50"  font-family="Inter, Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">per-action · cumulative spend cap</text>

  <rect x="412" y="78"  width="310" height="44" rx="9" fill="url(#inv-grad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow-inv)"/>
  <text x="567" y="98"  font-family="Inter, Arial, sans-serif" font-size="13" fill="#14532d" font-weight="700" text-anchor="middle">Velocity Invariant</text>
  <text x="567" y="115" font-family="Inter, Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">rate limit · calls per window</text>

  <rect x="412" y="143" width="310" height="44" rx="9" fill="url(#inv-grad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow-inv)"/>
  <text x="567" y="163" font-family="Inter, Arial, sans-serif" font-size="13" fill="#14532d" font-weight="700" text-anchor="middle">Concurrency Invariant</text>
  <text x="567" y="180" font-family="Inter, Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">parallel execution cap</text>

  <rect x="412" y="228" width="310" height="44" rx="9" fill="url(#inv-grad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow-inv)"/>
  <text x="567" y="248" font-family="Inter, Arial, sans-serif" font-size="13" fill="#14532d" font-weight="700" text-anchor="middle">Replay Protection</text>
  <text x="567" y="265" font-family="Inter, Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">idempotency · nonce · TOCTOU guard</text>

  <rect x="412" y="313" width="310" height="44" rx="9" fill="url(#inv-grad)" stroke="#86efac" stroke-width="1.5" filter="url(#shadow-inv)"/>
  <text x="567" y="333" font-family="Inter, Arial, sans-serif" font-size="13" fill="#14532d" font-weight="700" text-anchor="middle">Capability Scope</text>
  <text x="567" y="350" font-family="Inter, Arial, sans-serif" font-size="10" fill="#166534" text-anchor="middle">allowlist · kill-switch enforcement</text>

  <!-- Caption -->
  <text x="380" y="400" font-family="Inter, Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle" font-style="italic">Every risk maps to a deterministic policy invariant enforced before execution.</text>

</svg>
