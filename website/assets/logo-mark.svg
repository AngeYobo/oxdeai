<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Boundary ring -->
  <circle cx="20" cy="20" r="18.5" stroke="#16a34a" stroke-width="2"/>
  <!-- Execution boundary line (horizontal gate) -->
  <line x1="5" y1="20" x2="35" y2="20" stroke="#16a34a" stroke-width="1" stroke-dasharray="3 2.5" opacity="0.45"/>
  <!-- Ox monogram -->
  <text x="20" y="25.5" text-anchor="middle"
        font-family="ui-monospace,SFMono-Regular,SF Mono,Menlo,Consolas,monospace"
        font-weight="700" font-size="15" letter-spacing="-0.5"
        fill="#16a34a">Ox</text>
</svg>
